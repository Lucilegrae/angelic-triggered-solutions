name: Supabase Deploy

on:
  push:
    branches:
      - main

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Authenticate Supabase
        run: supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Authenticate Supabase
        run: supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy JWKS + ATS Functions
        run: |
          supabase functions deploy jwks --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy getBlessing --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy issue-role-token --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy weekly-audit-export --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy send-audit-report --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

  build:
    name: Build & Deploy Portal
    runs-on: ubuntu-latest
    needs: deploy-functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build portal
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

