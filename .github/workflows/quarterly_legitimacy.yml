name: Quarterly Legitimacy Report

on:
  schedule:
    - cron: "0 10 1 1,4,7,10 *"   # Jan, Apr, Jul, Oct 1st at 10:00 UTC
  workflow_dispatch:
jobs:
  quarterly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install plotly requests python-dotenv
      - name: Run quarterly legitimacy script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TABLE_NAME: legitimacy_flows
        run: python quarterly_legitimacy.py
