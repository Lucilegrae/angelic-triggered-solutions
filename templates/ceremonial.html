<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ceremonial Anthology Scroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>✨ Ceremonial Anthology Scroll ✨</h1>

  <div id="chamber">
    <button class="crest" id="stone">🌑 Stone</button>
    <button class="crest" id="river">💧 River</button>
    <button class="crest" id="flame">🔥 Flame</button>
    <button class="crest" id="celestial">✨ Celestial</button>
    <button class="crest" id="ouroboros">🐍 Ouroboros</button>
  </div>

  <div id="golden-star">🌟 Golden Star of Harmony 🌟</div>

  <div id="scroll">
    <h2>📜 Blessing Log</h2>
    <ul id="log"></ul>
  </div>

  <!-- Stakeholder Onboarding Forms -->
  <div id="stone-form">
    <h2>Community Membership & Housing Application</h2>
    <form id="memberForm">
      <label>Name:</label><input type="text" name="name" required>
      <label>National ID:</label><input type="text" name="national_id" required>
      <label>Insurance Policy Number:</label><input type="text" name="policy_number" required>
      <label>Preferred Location:</label><input type="text" name="location">
      <label>Family Size:</label><input type="number" name="family_size">
      <button type="submit">Apply</button>
    </form>
  </div>

  <div id="river-form">
    <h2>Insurance Policy Subscription</h2>
    <form id="insuranceForm">
      <label>Policy Type:</label>
      <select name="coverage_type">
        <option value="housing">Housing</option>
        <option value="health">Health</option>
        <option value="mining">Mining</option>
      </select>
      <label>Premium Amount:</label><input type="number" name="premium_amount" required>
      <button type="submit">Subscribe</button>
    </form>
  </div>

  <div id="flame-form">
    <h2>Miner Funding & Insurance Application</h2>
    <form id="minerForm">
      <label>Miner Name:</label><input type="text" name="name" required>
      <label>License Number:</label><input type="text" name="license_number" required>
      <label>Funding Amount Requested:</label><input type="number" name="amount_requested" required>
      <label>Purpose:</label><input type="text" name="purpose">
      <label>Insurance Policy Number:</label><input type="text" name="policy_number">
      <button type="submit">Submit Request</button>
    </form>
  </div>

  <div id="celestial-form">
    <h2>Land Allocation / Sale / Compensation</h2>
    <form id="landForm">
      <label>Source Type:</label>
      <select name="source_type">
        <option value="government">Government</option>
        <option value="municipal">Municipal Council</option>
        <option value="private">Private Landowner</option>
      </select>
      <label>Transaction Type:</label>
      <select name="transaction_type">
        <option value="allocation">Allocation</option>
        <option value="sale">Sale</option>
        <option value="compensation">Compensation</option>
      </select>
      <label>Location:</label><input type="text" name="location" required>
      <label>Size (hectares):</label><input type="number" name="size">
      <label>Value (if sale/compensation):</label><input type="number" name="value">
      <button type="submit">Record Transaction</button>
    </form>
  </div>

  <div id="ouroboros-form">
    <h2>Financing Approval & Prefunding</h2>
    <form id="financeForm">
      <label>Bank/Funder Name:</label><input type="text" name="bank_name" required>
      <label>Funding Request ID:</label><input type="text" name="fundingrequestid" required>
      <label>Approval Status:</label>
      <select name="status">
        <option value="approved">Approved</option>
        <option value="pending">Pending</option>
        <option value="rejected">Rejected</option>
      </select>
      <label>Disbursement Amount:</label><input type="number" name="amount">
      <button type="submit">Approve</button>
    </form>
  </div>

  <!-- Sound motifs -->
  <audio id="sound-stone" src="stone.mp3"></audio>
  <audio id="sound-river" src="river.mp3"></audio>
  <audio id="sound-flame" src="flame.mp3"></audio>
  <audio id="sound-celestial" src="celestial.mp3"></audio>
  <audio id="sound-ouroboros" src="ouroboros.mp3"></audio>

  <canvas id="constellation"></canvas>

  <script src="script.js"></script>
</body>
</html>
