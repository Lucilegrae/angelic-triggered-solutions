<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Steel Chamber - Angelic Triggered Solutions</title>
  <link rel="stylesheet" href="src/theme.css">
</head>
<body class="steel">

  <!-- Banner -->
  <header>
    <div class="banner-container">
      <img id="banner" src="banners/steel_banner.png" alt="Steel Banner">
    </div>
  </header>

  <!-- Crest Row -->
  <main class="container">
    <div class="crest-row">
      <img id="crest" src="images/crests/steel_crest.png" alt="Steel Crest">
    </div>

    <!-- Scroll Panel -->
    <div class="scroll-panel">
      <img src="images/crests/community_crest.png" alt="Community Crest">
      <div class="blessing-text">
        <h2>Steel Blessing</h2>
        <p>May the resilience of steel uphold progress and strengthen Kubatana District with endurance.</p>
      </div>
    </div>
  </main>

  <!-- Sound Motif -->
  <audio id="sound" src="sounds/steel_chime.mp3" preload="auto"></audio>
  <script>
    // Play sound motif on crest hover
    const crest = document.getElementById('crest');
    const sound = document.getElementById('sound');
    crest.addEventListener('mouseenter', () => sound.play());
  </script>

  <!-- Footer -->
  <footer>
    <p>© Angelic Triggered Solutions</p>
  </footer>

</body>
</html>
