<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Annual Crest Summary</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdf6e3; color: #333; }
    h1 { text-align: center; color: #b58900; }
    .chart-container { width: 80%; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>Annual Crest Summary</h1>
  <div class="chart-container">
    <canvas id="annualChart"></canvas>
  </div>
  <script>
    // Example data — replace with parsed archive logs
    const labels = ["2025", "2026"];
    const data = {
      labels: labels,
      datasets: [
        {
          label: "ATS Crest",
          backgroundColor: "#268bd2",
          data: [365, 120] // annual totals
        },
        {
          label: "Unity & Faith",
          backgroundColor: "#2aa198",
          data: [365, 120]
        },
        {
          label: "Golden Covenant",
          backgroundColor: "#b58900",
          data: [365, 120]
        }
      ]
    };
    const config = {
      type: 'bar',
      data: data,
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          title: { display: true, text: 'Annual Crest Regeneration Totals' }
        }
      }
    };
    new Chart(document.getElementById("annualChart"), config);
  </script>
</body>
</html>
