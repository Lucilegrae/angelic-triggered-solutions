<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Multi-Crest Toggle Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdf6e3; color: #333; }
    h1 { text-align: center; color: #b58900; }
    .controls { text-align: center; margin: 20px; }
    .chart-container { width: 90%; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>Interactive Multi-Crest Toggle Forecast</h1>
  <div class="controls">
    <label><input type="checkbox" id="atsConservative" checked onchange="updateVisibility()"> ATS - Conservative</label>
    <label><input type="checkbox" id="atsModerate" checked onchange="updateVisibility()"> ATS - Moderate</label>
    <label><input type="checkbox" id="unityConservative" checked onchange="updateVisibility()"> Unity - Conservative</label>
    <label><input type="checkbox" id="unityModerate" checked onchange="updateVisibility()"> Unity - Moderate</label>
    <label><input type="checkbox" id="covenantConservative" checked onchange="updateVisibility()"> Covenant - Conservative</label>
    <label><input type="checkbox" id="covenantModerate" checked onchange="updateVisibility()"> Covenant - Moderate</label>
  </div>
  <div class="chart-container">
    <canvas id="toggleChart"></canvas>
  </div>
  <script>
    const labels = ["2026", "2027", "2028", "2029"];
    const datasets = [
      { label: "ATS - Conservative", borderColor: "#268bd2", data: [720, 800, 880, 950], fill: false, borderDash: [5,5] },
      { label: "ATS - Moderate", borderColor: "#268bd2", data: [720, 900, 1100, 1300], fill: false },
      { label: "Unity - Conservative", borderColor: "#2aa198", data: [700, 780, 860, 940], fill: false, borderDash: [5,5] },
      { label: "Unity - Moderate", borderColor: "#2aa198", data: [700, 880, 1080, 1280], fill: false },
      { label: "Covenant - Conservative", borderColor: "#b58900", data: [710, 790, 870, 950], fill: false, borderDash: [5,5] },
      { label: "Covenant - Moderate", borderColor: "#b58900", data: [710, 890, 1090, 1290], fill: false }
    ];

    const config = {
      type: 'line',
      data: { labels: labels, datasets: datasets.map(ds => ({...ds, hidden:false})) },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          title: { display: true, text: 'Interactive Multi-Crest Scenario Toggle' }
        },
        scales: { y: { beginAtZero: true } }
      }
    };

    let toggleChart = new Chart(document.getElementById("toggleChart"), config);

    function updateVisibility() {
      toggleChart.data.datasets[0].hidden = !document.getElementById("atsConservative").checked;
      toggleChart.data.datasets[1].hidden = !document.getElementById("atsModerate").checked;
      toggleChart.data.datasets[2].hidden = !document.getElementById("unityConservative").checked;
      toggleChart.data.datasets[3].hidden = !document.getElementById("unityModerate").checked;
      toggleChart.data.datasets[4].hidden = !document.getElementById("covenantConservative").checked;
      toggleChart.data.datasets[5].hidden = !document.getElementById("covenantModerate").checked;
      toggleChart.update();
    }
  </script>
</body>
</html>
