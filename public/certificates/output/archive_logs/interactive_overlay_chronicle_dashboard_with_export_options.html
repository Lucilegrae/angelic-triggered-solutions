<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Overlay Chronicle Dashboard with Export Options</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .controls { text-align:center; margin:20px; }
    input { margin:5px; padding:5px; width:80px; }
    button { padding:10px 20px; margin:10px; background:#268bd2; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#2aa198; }
    .chart-container { width:85%; margin:20px auto; }
    .summary { margin:20px auto; width:90%; border:1px solid #b58900; padding:10px; background:#fefefe; }
    table { width:90%; margin:20px auto; border-collapse:collapse; }
    th, td { border:1px solid #b58900; padding:8px; text-align:center; }
  </style>
</head>
<body>
  <h1>ATS Interactive Overlay Chronicle Dashboard with Export Options</h1>
  <div class="controls">
    ATS×<input type="number" id="atsOverlay" value="1">
    Unity×<input type="number" id="unityOverlay" value="1">
    Covenant×<input type="number" id="covenantOverlay" value="1">
    <button onclick="applyOverlay()">Apply Overlay</button>
    <button onclick="exportChronicle()">Export Chronicle Archive</button>
  </div>
  <div class="chart-container"><canvas id="overlayChronicleChart"></canvas></div>
  <div class="summary" id="overlayChronicleSummary">Consensus + overlays merged and exportable...</div>
  <table>
    <thead><tr><th>Date</th><th>Consensus Text</th><th>Votes</th><th>ATS</th><th>Unity</th><th>Covenant</th><th>Overlay Projection</th><th>Cumulative Votes</th></tr></thead>
    <tbody id="chronicleTable"></tbody>
  </table>

  <script>
    const consensusHistory = [
      { date:"2026-03-31", text:"ATS steady, Unity rises", votes:4, factors:{ats:1,unity:1.5,covenant:1} },
      { date:"2026-04-30", text:"Unity doubles, Covenant declines", votes:6, factors:{ats:1,unity:2,covenant:0.5} },
      { date:"2026-05-15", text:"ATS strengthens, Covenant steady", votes:5, factors:{ats:1.5,unity:1,covenant:1} }
    ];

    let overlayChronicleChart;
    let overlayArchive = [];

    function applyOverlay() {
      const atsFactor = parseFloat(document.getElementById("atsOverlay").value);
      const unityFactor = parseFloat(document.getElementById("unityOverlay").value);
      const covenantFactor = parseFloat(document.getElementById("covenantOverlay").value);

      let cumulativeVotes = 0;
      const labels = [];
      const votesData = [];
      const overlayData = [];

      const table = document.getElementById("chronicleTable");
      table.innerHTML = "";

      consensusHistory.forEach(c=>{
        cumulativeVotes += c.votes;
        labels.push(c.date);
        votesData.push(cumulativeVotes);
        const overlayVal = (c.factors.ats*atsFactor)+(c.factors.unity*unityFactor)+(c.factors.covenant*covenantFactor);
        overlayData.push(overlayVal);

        table.innerHTML += `<tr>
          <td>${c.date}</td><td>${c.text}</td><td>${c.votes}</td>
          <td>${c.factors.ats}</td><td>${c.factors.unity}</td><td>${c.factors.covenant}</td>
          <td>${overlayVal}</td><td>${cumulativeVotes}</td>
        </tr>`;
      });

      overlayArchive.push({ timestamp:new Date().toISOString(), ats:atsFactor, unity:unityFactor, covenant:covenantFactor, latestProjection:overlayData.slice(-1)[0], cumulativeVotes });

      if (overlayChronicleChart) overlayChronicleChart.destroy();
      overlayChronicleChart = new Chart(document.getElementById("overlayChronicleChart"), {
        type:'line',
        data:{
          labels:labels,
          datasets:[
            { label:"Cumulative Votes", borderColor:"#268bd2", data:votesData, fill:false },
            { label:"Overlay Projection", borderColor:"#6c71c4", data:overlayData, fill:false, borderDash:[5,5] }
          ]
        }
      });

      document.getElementById("overlayChronicleSummary").innerText = 
        `Overlay applied → ATS×${atsFactor}, Unity×${unityFactor}, Covenant×${covenantFactor}. Latest overlay projection: ${overlayData.slice(-1)[0]}, cumulative votes: ${cumulativeVotes}`;
    }

    function exportChronicle() {
      const archive = { timestamp:new Date().toISOString(), overlays:overlayArchive, consensus:consensusHistory };
      const json = JSON.stringify(archive, null, 2);
      downloadFile(json, "json");

      let csv = "date,text,votes,ats,unity,covenant,overlayProjection,cumulativeVotes\n";
      overlayArchive.forEach(o=>{
        csv += `${o.timestamp},"Overlay",,${o.ats},${o.unity},${o.covenant},${o.latestProjection},${o.cumulativeVotes}\n`;
      });
      consensusHistory.forEach(c=>{
        csv += `${c.date},"${c.text}",${c.votes},${c.factors.ats},${c.factors.unity},${c.factors.covenant},,\n`;
      });
      downloadFile(csv, "csv");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("ATS Overlay Chronicle Archive", 10, 10);
      overlayArchive.forEach((o,i)=> doc.text(`${o.timestamp} - ATS×${o.ats}, Unity×${o.unity}, Covenant×${o.covenant}, Projection: ${o.latestProjection}, Cumulative Votes: ${o.cumulativeVotes}`, 10, 20+(i*10)));
      doc.save(`ATS_Overlay_Chronicle_${new Date().toISOString().split("T")[0]}.pdf`);
    }

    function downloadFile(content, type) {
      const blob = new Blob([content], {type:`text/${type}`});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ATS_Overlay_Chronicle_${new Date().toISOString().split("T")[0]}.${type}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Initialize with default overlay
    applyOverlay();

    // Schedule nightly export at 23:59
    function scheduleNightlyExport() {
      const now = new Date();
      const next = new Date();
      next.setHours(23,59,0,0);
      if (next <= now) next.setDate(next.getDate()+1);
      const delay = next.getTime() - now.getTime();
      setTimeout(function() {
        exportChronicle();
        setInterval(exportChronicle, 24*60*60*1000);
      }, delay);
    }
    scheduleNightlyExport();
  </script>
</body>
</html>
