<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Negotiation Chronicle Dashboard with Sanctified Contribution Archive</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .controls { text-align:center; margin:20px; }
    .chart-container { width:85%; margin:20px auto; }
    .summary { margin:20px auto; width:90%; border:1px solid #b58900; padding:10px; background:#fefefe; }
    .archive { margin:20px auto; width:90%; border:1px solid #268bd2; padding:10px; background:#fff; max-height:200px; overflow-y:auto; }
  </style>
</head>
<body>
  <h1>ATS Global Overlay Negotiation Chronicle with Sanctified Contribution Archive</h1>
  <div class="controls">
    <label>ATS×<input type="number" id="atsFactor" value="1" onchange="sendFactors()"></label>
    <label>Unity×<input type="number" id="unityFactor" value="1" onchange="sendFactors()"></label>
    <label>Covenant×<input type="number" id="covenantFactor" value="1" onchange="sendFactors()"></label>
  </div>
  <div class="chart-container"><canvas id="archiveFeedChart"></canvas></div>
  <div class="summary" id="archiveFeedSummary">Stakeholder inputs streaming and archived...</div>
  <div class="archive" id="archiveLog">Contribution archive will appear here...</div>

  <script>
    const negotiationHistory = [
      { date:"2026-03-31", text:"ATS steady, Unity rises", votes:4, factors:{ats:1,unity:1.5,covenant:1} },
      { date:"2026-04-30", text:"Unity doubles, Covenant declines", votes:6, factors:{ats:1,unity:2,covenant:0.5} },
      { date:"2026-05-15", text:"ATS strengthens, Covenant steady", votes:5, factors:{ats:1.5,unity:1,covenant:1} }
    ];

    let archiveFeedChart;
    const stakeholderFactors={};
    const archiveEntries=JSON.parse(localStorage.getItem("sanctifiedArchive")||"[]");

    function overlayProjection(factors){
      return negotiationHistory.map(c=>
        (c.factors.ats*factors.ats)+(c.factors.unity*factors.unity)+(c.factors.covenant*factors.covenant)
      );
    }

    function updateArchiveFeed(){
      const datasets=[];
      Object.keys(stakeholderFactors).forEach(name=>{
        datasets.push({
          label:`${name}'s overlay`,
          borderColor:"#"+Math.floor(Math.random()*16777215).toString(16),
          data:overlayProjection(stakeholderFactors[name]),
          fill:false
        });
      });

      if(archiveFeedChart) archiveFeedChart.destroy();
      archiveFeedChart=new Chart(document.getElementById("archiveFeedChart"),{
        type:'line',
        data:{ labels:negotiationHistory.map(c=>c.date), datasets }
      });

      const summaryText=Object.keys(stakeholderFactors).map(n=>`${n}: ${overlayProjection(stakeholderFactors[n]).slice(-1)[0]}`).join(" | ");
      document.getElementById("archiveFeedSummary").innerText=`Live projections → ${summaryText}`;

      // Render archive log
      const archiveDiv=document.getElementById("archiveLog");
      archiveDiv.innerHTML=archiveEntries.map(e=>`<div>[${e.timestamp}] ${e.name} → ATS:${e.ats}, Unity:${e.unity}, Covenant:${e.covenant}</div>`).join("");
    }

    function sendFactors(){
      const ats=parseFloat(document.getElementById("atsFactor").value);
      const unity=parseFloat(document.getElementById("unityFactor").value);
      const covenant=parseFloat(document.getElementById("covenantFactor").value);
      const msg={ type:"factors", name:"Stakeholder", ats, unity, covenant };
      socket.send(JSON.stringify(msg));
    }

    // WebSocket connection
    const socket=new WebSocket("ws://localhost:8080");
    socket.onmessage=function(event){
      const msg=JSON.parse(event.data);
      if(msg.type==="factors"){
        stakeholderFactors[msg.name]={ ats:msg.ats, unity:msg.unity, covenant:msg.covenant };
        // Archive entry
        const entry={ timestamp:new Date().toISOString(), name:msg.name, ats:msg.ats, unity:msg.unity, covenant:msg.covenant };
        archiveEntries.push(entry);
        localStorage.setItem("sanctifiedArchive",JSON.stringify(archiveEntries));
        updateArchiveFeed();
      }
    };

    // Initialize
    updateArchiveFeed();
  </script>
</body>
</html>
