<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Searchable Archival Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fdf6e3; color: #333; }
    h1 { text-align: center; color: #b58900; }
    .search { text-align: center; margin: 20px; }
    input { padding: 8px; width: 300px; }
    table { width: 90%; margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #b58900; padding: 10px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>ATS Searchable Archival Dashboard</h1>
  <div class="search">
    <input type="text" id="searchBox" placeholder="Search (e.g. ATS May 2026 PDF)">
    <button onclick="applySearch()">Search</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Crest</th>
        <th>Format</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="searchTable"></tbody>
  </table>

  <script>
    const exportHistory = [
      { crest:"ATS", format:"json", date:"2026-05-14" },
      { crest:"ATS", format:"csv", date:"2026-05-14" },
      { crest:"ATS", format:"pdf", date:"2026-05-14" },
      { crest:"Unity", format:"json", date:"2026-05-14" },
      { crest:"Unity", format:"csv", date:"2026-05-14" },
      { crest:"Unity", format:"pdf", date:"2026-05-14" },
      { crest:"Covenant", format:"json", date:"2026-05-15" },
      { crest:"Covenant", format:"csv", date:"2026-05-15" },
      { crest:"Covenant", format:"pdf", date:"2026-05-15" }
    ];

    function buildTable(data) {
      const table = document.getElementById("searchTable");
      table.innerHTML = "";
      data.forEach(e => {
        table.innerHTML += `<tr><td>${e.crest}</td><td>${e.format}</td><td>${e.date}</td></tr>`;
      });
    }

    function applySearch() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const filtered = exportHistory.filter(e =>
        e.crest.toLowerCase().includes(query) ||
        e.format.toLowerCase().includes(query) ||
        e.date.toLowerCase().includes(query)
      );
      buildTable(filtered);
    }

    // Initial table
    buildTable(exportHistory);
  </script>
</body>
</html>
