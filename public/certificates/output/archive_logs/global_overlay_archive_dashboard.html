<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Overlay Archive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .controls { text-align:center; margin:20px; }
    input { margin:5px; padding:5px; width:80px; }
    button { padding:10px 20px; margin:10px; background:#268bd2; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#2aa198; }
    .chart-container { width:85%; margin:20px auto; }
    .summary { margin:20px auto; width:90%; border:1px solid #b58900; padding:10px; background:#fefefe; }
    table { width:90%; margin:20px auto; border-collapse:collapse; }
    th, td { border:1px solid #b58900; padding:8px; text-align:center; }
  </style>
</head>
<body>
  <h1>ATS Global Overlay Archive Dashboard</h1>
  <div class="controls">
    <h3>Overlay Factors</h3>
    ATSĂ—<input type="number" id="atsOverlay" value="1">
    UnityĂ—<input type="number" id="unityOverlay" value="1">
    CovenantĂ—<input type="number" id="covenantOverlay" value="1">
    <button onclick="applyOverlay()">Apply Overlay</button>
    <button onclick="exportOverlay()">Export Overlay Archive</button>
  </div>
  <div class="chart-container"><canvas id="overlayArchiveChart"></canvas></div>
  <div class="summary" id="overlayArchiveSummary">Overlay comparisons will be archived nightly...</div>
  <table>
    <thead><tr><th>Date</th><th>Overlay ATS</th><th>Overlay Unity</th><th>Overlay Covenant</th><th>Projection</th></tr></thead>
    <tbody id="overlayTable"></tbody>
  </table>

  <script>
    const consensusHistory = [
      { date:"2026-03-31", text:"ATS steady, Unity rises", votes:4, factors:{ats:1,unity:1.5,covenant:1} },
      { date:"2026-04-30", text:"Unity doubles, Covenant declines", votes:6, factors:{ats:1,unity:2,covenant:0.5} },
      { date:"2026-05-15", text:"ATS strengthens, Covenant steady", votes:5, factors:{ats:1.5,unity:1,covenant:1} }
    ];

    let overlayArchiveChart;
    let overlayHistory = [];

    function applyOverlay() {
      const atsFactor = parseFloat(document.getElementById("atsOverlay").value);
      const unityFactor = parseFloat(document.getElementById("unityOverlay").value);
      const covenantFactor = parseFloat(document.getElementById("covenantOverlay").value);

      const labels = consensusHistory.map(c=>c.date);
      const overlayData = consensusHistory.map(c=>
        (c.factors.ats*atsFactor)+(c.factors.unity*unityFactor)+(c.factors.covenant*covenantFactor)
      );

      overlayHistory.push({ date:new Date().toISOString().split("T")[0], ats:atsFactor, unity:unityFactor, covenant:covenantFactor, projection:overlayData.slice(-1)[0] });

      if (overlayArchiveChart) overlayArchiveChart.destroy();
      overlayArchiveChart = new Chart(document.getElementById("overlayArchiveChart"), {
        type:'line',
        data:{ labels:labels, datasets:[{ label:"Overlay Projection", borderColor:"#6c71c4", data:overlayData, fill:false, borderDash:[5,5] }] }
      });

      document.getElementById("overlayArchiveSummary").innerText = 
        `Overlay applied â†’ ATSĂ—${atsFactor}, UnityĂ—${unityFactor}, CovenantĂ—${covenantFactor}. Latest projection: ${overlayData.slice(-1)[0]}`;

      const table = document.getElementById("overlayTable");
      table.innerHTML = "";
      overlayHistory.forEach(o=>{
        table.innerHTML += `<tr><td>${o.date}</td><td>${o.ats}</td><td>${o.unity}</td><td>${o.covenant}</td><td>${o.projection}</td></tr>`;
      });
    }

    function exportOverlay() {
      const archive = { timestamp:new Date().toISOString(), overlays:overlayHistory };
      const json = JSON.stringify(archive, null, 2);
      downloadFile(json, "json");

      let csv = "date,ats,unity,covenant,projection\n";
      overlayHistory.forEach(o=>{
        csv += `${o.date},${o.ats},${o.unity},${o.covenant},${o.projection}\n`;
      });
      downloadFile(csv, "csv");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("ATS Global Overlay Archive", 10, 10);
      overlayHistory.forEach((o,i)=> doc.text(`${o.date} - ATSĂ—${o.ats}, UnityĂ—${o.unity}, CovenantĂ—${o.covenant}, Projection: ${o.projection}`, 10, 20+(i*10)));
      doc.save(`ATS_Overlay_Archive_${new Date().toISOString().split("T")[0]}.pdf`);
    }

    function downloadFile(content, type) {
      const blob = new Blob([content], {type:`text/${type}`});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ATS_Overlay_Archive_${new Date().toISOString().split("T")[0]}.${type}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Schedule nightly export at 23:59
    function scheduleNightlyExport() {
      const now = new Date();
      const next = new Date();
      next.setHours(23,59,0,0);
      if (next <= now) next.setDate(next.getDate()+1);
      const delay = next.getTime() - now.getTime();
      setTimeout(function() {
        exportOverlay();
        setInterval(exportOverlay, 24*60*60*1000);
      }, delay);
    }
    scheduleNightlyExport();
  </script>
</body>
</html>
