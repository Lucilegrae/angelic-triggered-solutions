<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Summary Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fdf6e3; color: #333; }
    h1 { text-align: center; color: #b58900; }
    .summary { width: 80%; margin: 20px auto; border: 2px solid #b58900; padding: 20px; background: #fff; }
    .summary h2 { color: #268bd2; }
    .stats { display: flex; justify-content: space-around; margin-top: 20px; }
    .stat { text-align: center; }
    .stat h3 { margin: 5px 0; color: #2aa198; }
    .stat p { font-size: 1.2em; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ATS Global Summary</h1>
  <div class="summary">
    <h2>Overall Regeneration Totals</h2>
    <div class="stats">
      <div class="stat">
        <h3>Total Certificates</h3>
        <p>2,190</p>
      </div>
      <div class="stat">
        <h3>ATS Crest</h3>
        <p>730</p>
      </div>
      <div class="stat">
        <h3>Unity & Faith</h3>
        <p>730</p>
      </div>
      <div class="stat">
        <h3>Golden Covenant</h3>
        <p>730</p>
      </div>
    </div>
    <h2>Balance & Averages</h2>
    <div class="stats">
      <div class="stat">
        <h3>Daily Average</h3>
        <p>3</p>
      </div>
      <div class="stat">
        <h3>Monthly Average</h3>
        <p>90</p>
      </div>
      <div class="stat">
        <h3>Crest Balance</h3>
        <p>33% each</p>
      </div>
    </div>
  </div>
</body>
</html>
