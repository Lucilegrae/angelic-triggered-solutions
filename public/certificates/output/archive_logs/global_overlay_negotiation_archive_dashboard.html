<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Overlay Negotiation Archive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .chart-container { width:85%; margin:20px auto; }
    .summary { margin:20px auto; width:90%; border:1px solid #b58900; padding:10px; background:#fefefe; }
    button { padding:10px 20px; margin:10px; background:#268bd2; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#2aa198; }
    table { width:90%; margin:20px auto; border-collapse:collapse; }
    th, td { border:1px solid #b58900; padding:8px; text-align:center; }
  </style>
</head>
<body>
  <h1>ATS Global Overlay Negotiation Archive Dashboard</h1>
  <div class="chart-container"><canvas id="archiveChart"></canvas></div>
  <div class="summary" id="archiveSummary">Negotiated overlay consensus outcomes archived nightly...</div>
  <button onclick="exportArchive()">Export Negotiation Archive Now</button>
  <table>
    <thead><tr><th>Date</th><th>Consensus Text</th><th>Votes</th><th>ATS</th><th>Unity</th><th>Covenant</th><th>Projection</th></tr></thead>
    <tbody id="archiveTable"></tbody>
  </table>

  <script>
    const consensusHistory = [
      { date:"2026-03-31", text:"ATS steady, Unity rises", votes:4, factors:{ats:1,unity:1.5,covenant:1} },
      { date:"2026-04-30", text:"Unity doubles, Covenant declines", votes:6, factors:{ats:1,unity:2,covenant:0.5} },
      { date:"2026-05-15", text:"ATS strengthens, Covenant steady", votes:5, factors:{ats:1.5,unity:1,covenant:1} }
    ];

    let archiveChart;

    function overlayProjection(factors) {
      return consensusHistory.map(c=>
        (c.factors.ats*factors.ats)+(c.factors.unity*factors.unity)+(c.factors.covenant*factors.covenant)
      );
    }

    function buildArchive() {
      const datasets = consensusHistory.map(c=>({
        label:`${c.date} (${c.text})`,
        borderColor:"#"+Math.floor(Math.random()*16777215).toString(16),
        data:overlayProjection(c.factors),
        fill:false
      }));

      if (archiveChart) archiveChart.destroy();
      archiveChart = new Chart(document.getElementById("archiveChart"), {
        type:'line',
        data:{ labels:consensusHistory.map(c=>c.date), datasets }
      });

      const table = document.getElementById("archiveTable");
      table.innerHTML = "";
      consensusHistory.forEach(c=>{
        const proj = overlayProjection(c.factors).slice(-1)[0];
        table.innerHTML += `<tr><td>${c.date}</td><td>${c.text}</td><td>${c.votes}</td><td>${c.factors.ats}</td><td>${c.factors.unity}</td><td>${c.factors.covenant}</td><td>${proj}</td></tr>`;
      });

      document.getElementById("archiveSummary").innerText = `Archive built with ${consensusHistory.length} negotiated outcomes. Latest projection: ${overlayProjection(consensusHistory.slice(-1)[0].factors).slice(-1)[0]}`;
    }

    function exportArchive() {
      const archive = { timestamp:new Date().toISOString(), history:consensusHistory };
      const json = JSON.stringify(archive, null, 2);
      downloadFile(json, "json");

      let csv = "date,text,votes,ats,unity,covenant,projection\n";
      consensusHistory.forEach(c=>{
        const proj = overlayProjection(c.factors).slice(-1)[0];
        csv += `${c.date},"${c.text}",${c.votes},${c.factors.ats},${c.factors.unity},${c.factors.covenant},${proj}\n`;
      });
      downloadFile(csv, "csv");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("ATS Global Overlay Negotiation Archive", 10, 10);
      consensusHistory.forEach((c,i)=> doc.text(`${c.date} - ${c.text} (Votes: ${c.votes})`, 10, 20+(i*10)));
      doc.save(`ATS_Overlay_Negotiation_Archive_${new Date().toISOString().split("T")[0]}.pdf`);
    }

    function downloadFile(content, type) {
      const blob = new Blob([content], {type:`text/${type}`});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ATS_Overlay_Negotiation_Archive_${new Date().toISOString().split("T")[0]}.${type}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Initialize archive
    buildArchive();

    // Schedule nightly export at 23:59
    function scheduleNightlyExport() {
      const now = new Date();
      const next = new Date();
      next.setHours(23,59,0,0);
      if (next <= now) next.setDate(next.getDate()+1);
      const delay = next.getTime() - now.getTime();
      setTimeout(function() {
        exportArchive();
        setInterval(exportArchive, 24*60*60*1000);
      }, delay);
    }
    scheduleNightlyExport();
  </script>
</body>
</html>
