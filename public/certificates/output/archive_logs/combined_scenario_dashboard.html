<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Combined Crest Scenario Comparison</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdf6e3; color: #333; }
    h1 { text-align: center; color: #b58900; }
    .chart-container { width: 90%; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>Combined Crest Scenario Comparison</h1>
  <div class="chart-container">
    <canvas id="combinedChart"></canvas>
  </div>
  <script>
    const labels = ["2026", "2027", "2028", "2029"];
    const data = {
      labels: labels,
      datasets: [
        {
          label: "ATS - Conservative",
          borderColor: "#268bd2",
          backgroundColor: "#268bd2",
          data: [720, 800, 880, 950],
          fill: false,
          borderDash: [5, 5]
        },
        {
          label: "ATS - Moderate",
          borderColor: "#268bd2",
          backgroundColor: "#268bd2",
          data: [720, 900, 1100, 1300],
          fill: false
        },
        {
          label: "Unity - Conservative",
          borderColor: "#2aa198",
          backgroundColor: "#2aa198",
          data: [700, 780, 860, 940],
          fill: false,
          borderDash: [5, 5]
        },
        {
          label: "Unity - Moderate",
          borderColor: "#2aa198",
          backgroundColor: "#2aa198",
          data: [700, 880, 1080, 1280],
          fill: false
        },
        {
          label: "Covenant - Conservative",
          borderColor: "#b58900",
          backgroundColor: "#b58900",
          data: [710, 790, 870, 950],
          fill: false,
          borderDash: [5, 5]
        },
        {
          label: "Covenant - Moderate",
          borderColor: "#b58900",
          backgroundColor: "#b58900",
          data: [710, 890, 1090, 1290],
          fill: false
        }
      ]
    };
    const config = {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          title: { display: true, text: 'Combined Crest Scenario Comparison' }
        },
        scales: { y: { beginAtZero: true } }
      }
    };
    new Chart(document.getElementById("combinedChart"), config);
  </script>
</body>
</html>
