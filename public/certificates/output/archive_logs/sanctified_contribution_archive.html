<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sanctified Contribution Archive</title>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .status { text-align:center; margin:20px; font-weight:bold; }
    button { padding:10px 20px; margin:10px; background:#268bd2; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#2aa198; }
  </style>
</head>
<body>
  <h1>ATS Sanctified Contribution Archive</h1>
  <div class="status" id="status">Awaiting nightly preservation...</div>
  <button onclick="exportContributions()">Export Contributions Now</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // Example contributions (replace with live WebSocket feed)
    const contributions = [
      { name:"Prince", text:"Unity affirmed through crest regeneration", date:"2026-05-16" },
      { name:"Stakeholder A", text:"Golden Covenant preserved in sanctity", date:"2026-05-16" }
    ];

    function exportContributions() {
      const archive = { timestamp:new Date().toISOString(), contributions };
      const json = JSON.stringify(archive, null, 2);
      downloadFile(json, "json");

      let csv = "name,text,date\n";
      contributions.forEach(c => { csv += `"${c.name}","${c.text}",${c.date}\n`; });
      downloadFile(csv, "csv");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("ATS Sanctified Contribution Archive", 10, 10);
      contributions.forEach((c,i) => doc.text(`${c.date} - ${c.name}: ${c.text}`, 10, 20+(i*10)));
      doc.save(`ATS_Contribution_Archive_${new Date().toISOString().split("T")[0]}.pdf`);

      document.getElementById("status").innerText = `Contributions archived at ${new Date().toLocaleTimeString()}`;
    }

    function downloadFile(content, type) {
      const blob = new Blob([content], {type:`text/${type}`});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ATS_Contribution_Archive_${new Date().toISOString().split("T")[0]}.${type}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Schedule nightly export at 23:59
    function scheduleNightlyExport() {
      const now = new Date();
      const next = new Date();
      next.setHours(23,59,0,0);
      if (next <= now) next.setDate(next.getDate()+1);
      const delay = next.getTime() - now.getTime();
      setTimeout(function() {
        exportContributions();
        setInterval(exportContributions, 24*60*60*1000);
      }, delay);
    }

    scheduleNightlyExport();
  </script>
</body>
</html>
