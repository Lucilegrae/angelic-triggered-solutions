<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Overlay Chronicle Dashboard with Filters</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fdf6e3; color:#333; }
    h1 { text-align:center; color:#b58900; }
    .controls { text-align:center; margin:20px; }
    select, input { margin:5px; padding:5px; }
    button { padding:10px 20px; margin:10px; background:#268bd2; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#2aa198; }
    .chart-container { width:85%; margin:20px auto; }
    .summary { margin:20px auto; width:90%; border:1px solid #b58900; padding:10px; background:#fefefe; }
    table { width:90%; margin:20px auto; border-collapse:collapse; }
    th, td { border:1px solid #b58900; padding:8px; text-align:center; }
  </style>
</head>
<body>
  <h1>ATS Global Overlay Chronicle Dashboard with Interactive Filters</h1>
  <div class="controls">
    <label>Crest Filter:
      <select id="crestFilter" onchange="buildChronicle()">
        <option value="all">All</option>
        <option value="ATS">ATS</option>
        <option value="Unity">Unity</option>
        <option value="Covenant">Covenant</option>
      </select>
    </label>
    <label>Vote Threshold:
      <input type="number" id="voteThreshold" value="0" onchange="buildChronicle()">
    </label>
    <label>Date Range:
      <input type="date" id="startDate" onchange="buildChronicle()"> to
      <input type="date" id="endDate" onchange="buildChronicle()">
    </label>
    <button onclick="applyOverlay()">Apply Overlay</button>
  </div>
  <div class="chart-container"><canvas id="filterChart"></canvas></div>
  <div class="summary" id="filterSummary">Filter consensus + overlays by crest, votes, and date...</div>
  <table>
    <thead><tr><th>Date</th><th>Consensus Text</th><th>Votes</th><th>ATS</th><th>Unity</th><th>Covenant</th><th>Overlay Projection</th><th>Cumulative Votes</th></tr></thead>
    <tbody id="chronicleTable"></tbody>
  </table>

  <script>
    const consensusHistory = [
      { date:"2026-03-31", text:"ATS steady, Unity rises", votes:4, factors:{ats:1,unity:1.5,covenant:1} },
      { date:"2026-04-30", text:"Unity doubles, Covenant declines", votes:6, factors:{ats:1,unity:2,covenant:0.5} },
      { date:"2026-05-15", text:"ATS strengthens, Covenant steady", votes:5, factors:{ats:1.5,unity:1,covenant:1} }
    ];

    let filterChart;
    let overlayFactors = { ats:1, unity:1, covenant:1 };

    function applyOverlay() {
      overlayFactors = {
        ats:parseFloat(document.getElementById("atsOverlay")?.value||1),
        unity:parseFloat(document.getElementById("unityOverlay")?.value||1),
        covenant:parseFloat(document.getElementById("covenantOverlay")?.value||1)
      };
      buildChronicle();
    }

    function buildChronicle() {
      const crestFilter = document.getElementById("crestFilter").value;
      const voteThreshold = parseInt(document.getElementById("voteThreshold").value);
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      let cumulativeVotes = 0;
      const labels = [];
      const votesData = [];
      const overlayData = [];

      const table = document.getElementById("chronicleTable");
      table.innerHTML = "";

      consensusHistory.forEach(c=>{
        if (c.votes < voteThreshold) return;
        if (startDate && c.date < startDate) return;
        if (endDate && c.date > endDate) return;

        cumulativeVotes += c.votes;
        labels.push(c.date);
        votesData.push(cumulativeVotes);

        let overlayVal = 0;
        if (crestFilter==="all"||crestFilter==="ATS") overlayVal += c.factors.ats*overlayFactors.ats;
        if (crestFilter==="all"||crestFilter==="Unity") overlayVal += c.factors.unity*overlayFactors.unity;
        if (crestFilter==="all"||crestFilter==="Covenant") overlayVal += c.factors.covenant*overlayFactors.covenant;
        overlayData.push(overlayVal);

        table.innerHTML += `<tr>
          <td>${c.date}</td><td>${c.text}</td><td>${c.votes}</td>
          <td>${c.factors.ats}</td><td>${c.factors.unity}</td><td>${c.factors.covenant}</td>
          <td>${overlayVal}</td><td>${cumulativeVotes}</td>
        </tr>`;
      });

      if (filterChart) filterChart.destroy();
      filterChart = new Chart(document.getElementById("filterChart"), {
        type:'line',
        data:{
          labels:labels,
          datasets:[
            { label:"Cumulative Votes", borderColor:"#268bd2", data:votesData, fill:false },
            { label:"Overlay Projection", borderColor:"#6c71c4", data:overlayData, fill:false, borderDash:[5,5] }
          ]
        }
      });

      document.getElementById("filterSummary").innerText = 
        `Filters → Crest: ${crestFilter}, Vote Threshold: ${voteThreshold}, Date Range: ${startDate||"start"} to ${endDate||"end"}. Latest overlay projection: ${overlayData.slice(-1)[0]||"N/A"}, cumulative votes: ${cumulativeVotes}`;
    }

    // Initialize with defaults
    buildChronicle();
  </script>
</body>
</html>
