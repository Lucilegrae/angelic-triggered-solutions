<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS Beneficiary Manager</title>
<style>
body { font-family: system-ui; background:#020617; color:#e5e7eb; margin:0; }
header { padding:16px 24px; background:#0f172a; display:flex; justify-content:space-between; align-items:center; }
h1 { margin:0; font-size:20px; }
main { padding:20px; max-width:800px; margin:0 auto; }
.card { background:#0f172a; border:1px solid #1f2937; border-radius:10px; padding:20px; margin-bottom:20px; }
label { font-size:14px; color:#9ca3af; }
input { width:100%; padding:10px; margin-top:4px; margin-bottom:12px; border-radius:6px; border:1px solid #374151; background:#020617; color:#e5e7eb; }
button { padding:10px 16px; border-radius:6px; border:none; background:#2563eb; color:white; cursor:pointer; }
button.red { background:#dc2626; }
.beneficiary-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #1f2937; }
</style>
</head>
<body>

<header>
  <h1>ATS Beneficiary Manager</h1>
  <div style="font-size:12px;color:#9ca3af;">Angelic Triggered Solutions · Local Admin</div>
</header>

<main>

  <div class="card">
    <h2>Load Insurance Profile</h2>
    <label>INS UUID</label>
    <input id="insInput" placeholder="INS-UUID-xxxx" />
    <button onclick="loadProfile()">Load</button>
  </div>

  <div id="manager" class="card" style="display:none;">
    <h2>Beneficiaries</h2>

    <div id="beneficiaryList"></div>

    <h3>Add New Beneficiary</h3>
    <input id="newBeneficiary" placeholder="Full name" />
    <button onclick="addBeneficiary()">Add</button>

    <br><br>
    <button onclick="saveProfile()">Save Changes</button>
  </div>

</main>

<script>
let currentUUID = null;
let profile = null;

function loadProfile() {
  const uuid = document.getElementById('insInput').value.trim();
  if (!uuid) return;

  fetch('profiles/' + uuid + '.json')
    .then(r => r.json())
    .then(data => {
      currentUUID = uuid;
      profile = data;
      document.getElementById('manager').style.display = 'block';
      renderBeneficiaries();
    })
    .catch(() => alert("Profile not found."));
}

function renderBeneficiaries() {
  const list = document.getElementById('beneficiaryList');
  list.innerHTML = '';

  profile.beneficiaries.forEach((name, index) => {
    const div = document.createElement('div');
    div.className = 'beneficiary-item';
    div.innerHTML = `
      <span>${name}</span>
      <button class="red" onclick="removeBeneficiary(${index})">Remove</button>
    `;
    list.appendChild(div);
  });
}

function addBeneficiary() {
  const name = document.getElementById('newBeneficiary').value.trim();
  if (!name) return;
  profile.beneficiaries.push(name);
  document.getElementById('newBeneficiary').value = '';
  renderBeneficiaries();
}

function removeBeneficiary(index) {
  profile.beneficiaries.splice(index, 1);
  renderBeneficiaries();
}

function saveProfile() {
  const updated = JSON.stringify(profile, null, 2);
  const blob = new Blob([updated], {type: 'application/json'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = currentUUID + '.json';
  a.click();

  alert("Beneficiaries updated. Replace the file in /profiles/ to apply changes.");
}
</script>

</body>
</html>
