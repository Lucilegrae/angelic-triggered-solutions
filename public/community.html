<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Chamber - Angelic Triggered Solutions</title>
  <link rel="stylesheet" href="src/theme.css">
</head>
<body class="community">

  <!-- Banner -->
  <header>
    <div class="banner-container">
      <img id="banner" src="banners/community_banner.png" alt="Community Banner">
    </div>
  </header>

  <!-- Crest Row -->
  <main class="container">
    <div class="crest-row">
      <img id="crest" src="images/crests/community_crest.png" alt="Community Crest">
    </div>

    <!-- Scroll Panel -->
    <div class="scroll-panel">
      <img src="images/crests/community_crest.png" alt="Community Crest">
      <div class="blessing-text">
        <h2>Community Blessing</h2>
        <p>May the spirit of community nurture belonging and uplift Kubatana District with solidarity.</p>
      </div>
    </div>
  </main>

  <!-- Sound Motif -->
  <audio id="sound" src="sounds/community_drum.mp3" preload="auto"></audio>
  <script>
    // Play sound motif on crest hover
    const crest = document.getElementById('crest');
    const sound = document.getElementById('sound');
    crest.addEventListener('mouseenter', () => sound.play());
  </script>

  <!-- Footer -->
  <footer>
    <p>© Angelic Triggered Solutions</p>
  </footer>

</body>
</html>
